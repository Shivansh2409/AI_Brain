<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo-circle">🧠</div>
        <div>
          <h1 class="title">Second Brain</h1>
          <p class="subtitle">AI Knowledge Capture</p>
        </div>
      </div>

      <div class="action-area">
        <label class="input-label">Why are you saving this?</label>

        <div class="reason-pills" id="reason-container">
          <button class="pill active" data-reason="Read Later">
            Read Later
          </button>
          <button class="pill" data-reason="YouTube Content">
            YouTube Content
          </button>
          <button class="pill" data-reason="Hackathon Idea">
            Hackathon Idea
          </button>
          <button class="pill" data-reason="Code Reference">
            Code Reference
          </button>
        </div>

        <textarea
          id="user-note"
          class="note-input"
          placeholder="Add a custom note or thought (optional)..."
          rows="2"
        ></textarea>

        <button id="save-btn" class="btn-primary">
          <svg
            id="btn-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"
            ></path>
            <polyline points="17 21 17 13 7 13 7 21"></polyline>
            <polyline points="7 3 7 8 15 8"></polyline>
          </svg>
          <span id="btn-text">Save to Brain</span>
        </button>

        <p id="status-msg" class="status hidden"></p>
      </div>
      <div class="footer">
        <a href="http://localhost:3001" target="_blank" class="dashboard-link">
          Open Dashboard
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="7" y1="17" x2="17" y2="7"></line>
            <polyline points="7 7 17 7 17 17"></polyline>
          </svg>
        </a>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
